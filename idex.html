<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giai Điệu Vui Nhộn</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000; /* Nền đen cho nổi bật */
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
            z-index: 2;
        }

        /* Hiệu ứng đĩa nhạc xoay liên tục */
        .disc {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #444 20%, #111 100%);
            border-radius: 50%;
            border: 10px solid #222;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotate 3s linear infinite;
        }

        .disc::after {
            content: '';
            width: 60px;
            height: 60px;
            background: #fff;
            border-radius: 50%;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hint {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #ff4757;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }
    </style>
</head>
<body onclick="enableAudio()"> <div class="container">
    <div class="disc"></div>
    <div class="hint" id="status">Nhấn vào đây để nghe nhạc! 🎵</div>
    
    <audio id="myAudio" loop autoplay muted>
        <source src="ssstik.io_1776920519240.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    const audio = document.getElementById('myAudio');
    const status = document.getElementById('status');

    // Hàm này sẽ chạy khi người dùng click vào trang web
    function enableAudio() {
        if (audio.muted) {
            audio.muted = false; // Mở tiếng
            audio.play();        // Đảm bảo nhạc phát
            status.innerText = "Đang quẩy cực căng! 🔥";
            status.style.color = "#2ed573";
        }
    }

    // Cố gắng phát nhạc ngay khi load (thường sẽ ở chế độ muted)
    window.addEventListener('load', () => {
        audio.play().catch(error => {
            console.log("Trình duyệt yêu cầu tương tác để phát nhạc.");
        });
    });
</script>

</body>
</html>
