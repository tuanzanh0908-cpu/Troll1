<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giai Điệu Vui Nhộn - Max Volume</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            cursor: pointer; /* Hiển thị biểu tượng bàn tay để khuyến khích click */
        }

        .visualizer {
            text-align: center;
            color: #fff;
        }

        /* Hiệu ứng vòng tròn rung động theo nhịp nhạc */
        .circle {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #ff0000 10%, #000 100%);
            border-radius: 50%;
            margin-bottom: 20px;
            animation: pulse 0.5s infinite alternate;
            box-shadow: 0 0 50px #ff0000;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.2); opacity: 1; }
        }

        h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #ff4757;
            text-shadow: 0 0 10px #ff4757;
        }

        p {
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body onclick="startParty()">

    <div class="visualizer">
        <div class="circle"></div>
        <h1 id="text">Chạm để quẩy!</h1>
        <p>(Âm lượng đã được đặt mức cao nhất)</p>
    </div>

    <audio id="audioPlayer" loop>
        <source src="ssstik.io_1776920519240.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('audioPlayer');
        const text = document.getElementById('text');

        // Cố gắng phát ngay khi load (thường sẽ bị trình duyệt chặn cho đến khi click)
        window.addEventListener('load', () => {
            audio.volume = 1.0; // Thiết lập âm lượng cao nhất (từ 0.0 đến 1.0)
            audio.play().catch(() => {
                console.log("Chờ người dùng tương tác để phát âm thanh...");
            });
        });

        function startParty() {
            audio.volume = 1.0; // Đảm bảo âm lượng luôn ở mức 100%
            audio.play();
            text.innerText = "ĐANG PHÁT MAX VOLUME! 🔥";
            
            // Hiệu ứng đổi màu nền ngẫu nhiên theo nhịp
            setInterval(() => {
                const colors = ['#1e1e1e', '#000000', '#2d0000'];
                document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            }, 100);
        }
    </script>
</body>
</html>
